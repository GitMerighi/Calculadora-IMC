<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body id="contenedor" class="container text-center p-3 bg-warning-subtle">



    <main>
        <form class="calculadora rounded container p-2">
            <h1 class="p-3 rounded">Calculadora I.M.C</h1>

            <div class="p-3">
                <div class="form-floating mb-3">
                    <input type="number" name="peso" id="peso" class="form-control" placeholder="">
                    <label for="peso">Ingrese su peso (Kg)</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="number" name="altura" id="altura" class="form-control" placeholder="">
                    <label for="altura">Ingrese su altura (m)</label>
                </div>


                <button id="boton-calcular" class="btn btn-info mb-3" type="button" onclick="imc()">Calcular
                    I.M.C</button>


                <div id="div-resultados" class="oculto">
                    <h2>¡Resultados!</h2>
                    <div class="form-floating mb-3">
                        <input type="text" readonly id="resultado" class="form-control">
                        <label for="resultado">Valor del I.M.C</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" readonly id="estado" class="form-control">
                        <label for="estado">Estado</label>
                    </div>
                </div>
            </div>

        </form>
    </main>
    <script src="js/javascript.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>





</body>

</html>
